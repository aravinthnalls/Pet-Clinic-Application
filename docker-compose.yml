version: '3.9'
services:
  backend:
    build: ./.
    ports:
    - 8080:8080
    environment:
      APP_ENV: production
      DEBUG: 'false'
      DB_HOST: postgres
      DB_PORT: '5432'
    restart: unless-stopped
    healthcheck:
      test:
      - CMD-SHELL
      - curl -fsS http://localhost:8080/ || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
  postgres:
    image: postgres:16
    restart: unless-stopped
    ports:
    - 5432:5432
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: change-me
    volumes:
    - postgres_data:/var/lib/postgresql/data
    - ./docker/init/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB
      interval: 10s
      timeout: 5s
      retries: 10
volumes:
  postgres_data: {}
