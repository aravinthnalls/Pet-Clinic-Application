name: AI DevOps Agent

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:
    inputs:
      create_pull_request:
        description: Create a pull request when generated files change
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ai-devops-agent-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  DEVOPS_AGENT_SOURCE_REPO: aravinthnalls/DevOpsAgent
  DEVOPS_AGENT_REF: main
  AGENT_REPO_PATH: .github/tools/devops-agent-source
  AGENT_PATH: .github/tools/devops-agent-source/ai_devops_agent.py

jobs:
  run-ai-devops-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository for PR analysis or manual run
        if: github.event_name != 'pull_request' || github.event.action != 'closed'
        uses: actions/checkout@v4

      - name: Checkout merged base branch for follow-up PR
        if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Checkout AI DevOps Agent source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DEVOPS_AGENT_SOURCE_REPO }}
          ref: ${{ env.DEVOPS_AGENT_REF }}
          path: ${{ env.AGENT_REPO_PATH }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install agent dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r "$AGENT_REPO_PATH/requirements.txt"

      - name: Run AI DevOps Agent
        env:
          OPENAI_API_TOKEN: ${{ secrets.OPENAI_API_TOKEN }}
        run: |
          python "$AGENT_PATH" \
            --project-root . \
            --config-file pipeline_request.txt \
            --mode ai \
            > ai-devops-agent-output.txt 2>&1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-devops-agent-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            ai-devops-agent-output.txt
            AI_DEVOPS_REPORT.md
            README_GENERATED.md
            .github/workflows/pipeline.yml
            terraform/**
            docker-compose.yml

      - name: Comment on pull request
        if: github.event_name == 'pull_request' && github.event.action != 'closed' && always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const body = fs.existsSync('AI_DEVOPS_REPORT.md')
              ? fs.readFileSync('AI_DEVOPS_REPORT.md', 'utf8').slice(0, 60000)
              : 'AI DevOps Agent completed, but no AI_DEVOPS_REPORT.md was generated.';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Create pull request with generated changes
        if: github.event_name == 'workflow_dispatch' && inputs.create_pull_request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/ai-devops-agent-${{ github.run_id }}
          commit-message: 'chore: apply AI DevOps agent outputs'
          title: 'chore: apply AI DevOps agent outputs'
          add-paths: |
            AI_DEVOPS_REPORT.md
            README_GENERATED.md
            .github/workflows/pipeline.yml
            terraform
            docker-compose.yml
          body: |
            This pull request was created by the AI DevOps Agent workflow.

            - Mode: `ai`
            - Source: `${{ env.DEVOPS_AGENT_SOURCE_REPO }}@${{ env.DEVOPS_AGENT_REF }}`

            Review the AI report, generated workflow, Terraform, Docker Compose, and README output before merge.

      - name: Create follow-up pull request after merge
        if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/ai-devops-follow-up-${{ github.run_id }}
          commit-message: 'chore: apply AI DevOps follow-up changes'
          title: 'chore: AI DevOps follow-up suggestions'
          add-paths: |
            AI_DEVOPS_REPORT.md
            README_GENERATED.md
            .github/workflows/pipeline.yml
            terraform
            docker-compose.yml
          body: |
            This pull request was created automatically after PR #${{ github.event.pull_request.number }} was merged.

            - Trigger: merged PR follow-up
            - Source PR: #${{ github.event.pull_request.number }}
            - Source: `${{ env.DEVOPS_AGENT_SOURCE_REPO }}@${{ env.DEVOPS_AGENT_REF }}`

            Review the AI report, generated workflow, Terraform, Docker Compose, and README output before merge.
