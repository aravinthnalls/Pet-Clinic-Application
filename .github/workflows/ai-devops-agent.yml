name: AI DevOps Agent

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      mode:
        description: Agent execution mode
        required: true
        default: suggest-changes
        type: choice
        options:
          - analyze-only
          - suggest-changes
          - generate
          - generate-and-commit
      create_pull_request:
        description: Create a pull request when generate mode creates files
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ai-devops-agent-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  DEVOPS_AGENT_SOURCE_REPO: aravinthnalls/DevOpsAgent
  DEVOPS_AGENT_REF: main
  AGENT_REPO_PATH: .github/tools/devops-agent-source
  AGENT_PATH: .github/tools/devops-agent-source/ai_devops_agent.py

jobs:
  analyze-and-comment:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout AI DevOps Agent source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DEVOPS_AGENT_SOURCE_REPO }}
          ref: ${{ env.DEVOPS_AGENT_REF }}
          path: ${{ env.AGENT_REPO_PATH }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run AI analysis
        run: |
          python "$AGENT_PATH" \
            --project-root . \
            --config-file pipeline_request.txt \
            --mode analyze-only \
            --verbose \
            > ai-devops-agent-output.txt

      - name: Generate suggestions report
        run: |
          python "$AGENT_PATH" \
            --project-root . \
            --config-file pipeline_request.txt \
            --mode suggest-changes \
            > suggestions-output.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-devops-agent-pr-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            ai-devops-agent-output.txt
            suggestions-output.txt
            SUGGESTIONS.md

      - name: Comment on pull request
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const summary = fs.existsSync('SUGGESTIONS.md')
              ? fs.readFileSync('SUGGESTIONS.md', 'utf8').slice(0, 60000)
              : 'AI DevOps Agent completed, but no suggestions report was generated.';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: summary
            });

  manual-run:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout AI DevOps Agent source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DEVOPS_AGENT_SOURCE_REPO }}
          ref: ${{ env.DEVOPS_AGENT_REF }}
          path: ${{ env.AGENT_REPO_PATH }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run selected mode
        run: |
          python "$AGENT_PATH" \
            --project-root . \
            --config-file pipeline_request.txt \
            --mode "${{ inputs.mode }}" \
            > ai-devops-agent-output.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-devops-agent-manual-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            ai-devops-agent-output.txt
            SUGGESTIONS.md
            README_GENERATED.md
            .github/generated/**
            .github/workflows/pipeline.yml

      - name: Create pull request with generated changes
        if: inputs.mode == 'generate' && inputs.create_pull_request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/ai-devops-agent-${{ github.run_id }}
          commit-message: 'chore: apply AI DevOps agent outputs'
          title: 'chore: apply AI DevOps agent outputs'
          body: |
            This pull request was created by the AI DevOps Agent demo workflow.

            - Mode: `${{ inputs.mode }}`
            - Source: `${{ env.DEVOPS_AGENT_SOURCE_REPO }}@${{ env.DEVOPS_AGENT_REF }}`

            Review generated workflows, Terraform, Dockerfiles, and README changes before merge.
