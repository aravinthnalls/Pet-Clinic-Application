<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'owners')}">

<body>

  <section class="page-intro">
    <div>
      <span class="section-kicker">Visit workflow</span>
      <h1>
        <th:block th:if="${visit['new']}">Add visit</th:block>
        <th:block th:unless="${visit['new']}">Update visit</th:block>
      </h1>
      <p class="section-lead">Record the latest appointment while keeping the full pet context visible.</p>
    </div>
  </section>

  <section class="panel-card form-panel">
    <div class="pet-summary-grid">
      <div class="detail-item">
        <span class="detail-label" th:text="#{name}">Name</span>
        <strong th:text="${pet.name}">Pet Name</strong>
      </div>
      <div class="detail-item">
        <span class="detail-label" th:text="#{birthDate}">Birth Date</span>
        <strong th:text="${#temporals.format(pet.birthDate, 'yyyy-MM-dd')}">2024-01-01</strong>
      </div>
      <div class="detail-item">
        <span class="detail-label" th:text="#{type}">Type</span>
        <strong th:text="${pet.type}">cat</strong>
      </div>
      <div class="detail-item">
        <span class="detail-label" th:text="#{owner}">Owner</span>
        <strong th:text="${owner?.firstName + ' ' + owner?.lastName}">Owner Name</strong>
      </div>
    </div>

    <form th:object="${visit}" class="app-form" method="post">
      <div class="app-form-fields">
        <input th:replace="~{fragments/inputField :: input ('Date', 'date', 'date')}" />
        <input th:replace="~{fragments/inputField :: input ('Description', 'description', 'text')}" />
      </div>

      <div class="form-actions">
        <input type="hidden" name="petId" th:value="${pet.id}" />
        <button class="btn btn-primary" type="submit" th:text="#{addVisit}">Add Visit</button>
        <a class="btn btn-secondary" th:href="@{/owners/__${owner.id}__}">Back to owner</a>
      </div>
    </form>
  </section>

  <section class="section-block" th:if="${!visit['new'] and !pet.visits.isEmpty()}">
    <div class="section-heading">
      <div>
        <span class="section-kicker">History</span>
        <h2 th:text="#{previousVisits}">Previous Visits</h2>
      </div>
    </div>
    <div class="panel-card table-card">
      <div class="table-responsive">
        <table class="table app-table">
          <thead>
            <tr>
              <th th:text="#{date}">Date</th>
              <th th:text="#{description}">Description</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="visit : ${pet.visits}">
              <td th:text="${#temporals.format(visit.date, 'yyyy-MM-dd')}">2024-01-01</td>
              <td th:text="${visit.description}">Description</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>

</body>

</html>
