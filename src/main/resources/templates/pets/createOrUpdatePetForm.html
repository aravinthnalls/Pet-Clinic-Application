<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'owners')}">

<body>

  <section class="page-intro">
    <div>
      <span class="section-kicker">Pet profile</span>
      <h1>
        <th:block th:if="${pet['new']}">Add new pet</th:block>
        <th:block th:unless="${pet['new']}">Update pet</th:block>
      </h1>
      <p class="section-lead">Attach a pet to its owner and keep the clinic record ready for future visits.</p>
    </div>
  </section>

  <section class="panel-card form-panel">
    <div class="owner-highlight">
      <span class="detail-label" th:text="#{owner}">Owner</span>
      <strong th:text="${owner?.firstName + ' ' + owner?.lastName}">Owner Name</strong>
    </div>
    <form th:object="${pet}" class="app-form" method="post">
      <input type="hidden" name="id" th:value="*{id}" />
      <div class="app-form-fields">
        <input th:replace="~{fragments/inputField :: input ('Name', 'name', 'text')}" />
        <input th:replace="~{fragments/inputField :: input ('Birth Date', 'birthDate', 'date')}" />
        <input th:replace="~{fragments/selectField :: select ('Type', 'type', ${types})}" />
      </div>
      <div class="form-actions">
        <button th:with="text=${pet['new']} ? 'Add Pet' : 'Update Pet'" class="btn btn-primary" type="submit"
          th:text="${text}">Add Pet</button>
        <a class="btn btn-secondary" th:href="@{/owners/__${owner.id}__}">Back to owner</a>
      </div>
    </form>
  </section>

</body>

</html>
