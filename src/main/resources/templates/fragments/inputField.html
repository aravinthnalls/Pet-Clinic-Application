<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org">

<body>
  <form>
    <th:block th:fragment="input (label, name, type)">
      <div th:with="valid=${!#fields.hasErrors(name)}" th:class="${'app-form-row' + (valid ? '' : ' has-error')}"
        class="app-form-row">
        <label th:for="${name}" class="form-label app-form-label" th:text="${label}">Label</label>
        <div class="app-field">
          <div th:switch="${type}">
            <input th:case="'text'" class="form-control form-control-lg" type="text" th:field="*{__${name}__}" />
            <input th:case="'date'" class="form-control form-control-lg" type="date" th:field="*{__${name}__}" />
          </div>
          <th:block th:if="${!valid}">
            <span class="help-inline" th:errors="*{__${name}__}" th:text="#{error}">Error</span>
          </th:block>
        </div>
      </div>
    </th:block>
  </form>
</body>

</html>
