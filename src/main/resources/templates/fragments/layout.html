<!DOCTYPE html>

<html th:fragment="layout (template, menu)" xmlns:th="https://www.thymeleaf.org">

<head>

  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="shortcut icon" type="image/x-icon" th:href="@{/resources/images/favicon.png}" />
  <title th:text="#{layoutTitle}">PetClinic :: a Spring Framework demonstration</title>
  <link th:href="@{/webjars/font-awesome/css/font-awesome.min.css}" rel="stylesheet" />
  <link rel="stylesheet" th:href="@{/resources/css/petclinic.css}" />

</head>

<body class="app-shell">

  <nav class="navbar navbar-expand-lg navbar-dark app-navbar" role="navigation">
    <div class="container app-nav-container">
      <a class="navbar-brand app-brand" th:href="@{/}">
        <span class="brand-badge">
          <span class="fa fa-heartbeat" aria-hidden="true"></span>
        </span>
        <span class="brand-copy">
          <span class="brand-title">PetClinic</span>
          <span class="brand-subtitle">DevOps meetup demo</span>
        </span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#main-navbar">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="main-navbar">

        <ul class="navbar-nav me-auto mb-2 mb-lg-0" th:remove="all">

          <li th:fragment="menuItem (link,active,title,glyph,text)" th:class="nav-item">
            <a th:class="${active==menu ? 'nav-link active app-nav-link' : 'nav-link app-nav-link'}"
              th:href="@{__${link}__}" th:title="${title}">
              <span th:class="'fa fa-'+${glyph} + ' app-nav-icon'" class="fa fa-home app-nav-icon"></span>
              <span class="app-nav-text" th:text="${text}">Template</span>
            </a>
          </li>

        </ul>

        <ul class="navbar-nav ms-lg-auto app-nav-list">

          <li th:replace="~{::menuItem ('/','home','home page','home',#{home})}">
            <span class="fa fa-home" aria-hidden="true"></span>
            <span th:text="#{home}">Home</span>
          </li>

          <li th:replace="~{::menuItem ('/owners/find','owners','find owners','search',#{findOwners})}">
            <span class="fa fa-search" aria-hidden="true"></span>
            <span th:text="#{findOwners}">Find owners</span>
          </li>

          <li th:replace="~{::menuItem ('/vets.html','vets','veterinarians','th-list',#{vets})}">
            <span class="fa fa-th-list" aria-hidden="true"></span>
            <span th:text="#{vets}">Veterinarians</span>
          </li>

          <li
            th:replace="~{::menuItem ('/oups','error','trigger a RuntimeException to see how it is handled','exclamation-triangle',#{error})}">
            <span class="fa exclamation-triangle" aria-hidden="true"></span>
            <span th:text="#{error}">Error</span>
          </li>

        </ul>

        <div class="app-status-pill d-none d-lg-inline-flex">
          <span class="app-status-dot"></span>
          Demo ready
        </div>
      </div>
    </div>
  </nav>
  <main class="app-main">
    <div class="container xd-container app-content">
      <th:block th:insert="${template}" />

      <footer class="app-footer">
        <div class="app-footer-copy">
          <p class="app-footer-title">Built for calm, confident demos</p>
          <p class="app-footer-text">Spring Boot, Thymeleaf, and polished clinic workflows in one clean presentation.</p>
        </div>
        <img src="../static/images/spring-logo.svg" th:src="@{/resources/images/spring-logo.svg}"
          alt="VMware Tanzu Logo" class="logo app-footer-logo" />
      </footer>
    </div>
  </main>

  <script th:src="@{/webjars/bootstrap/dist/js/bootstrap.bundle.min.js}"></script>

</body>

</html>
