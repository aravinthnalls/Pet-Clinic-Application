<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'owners')}">

<body>

  <section class="page-intro">
    <div>
      <span class="section-kicker">Owner workflow</span>
      <h1 th:text="#{findOwners}">Find Owners</h1>
      <p class="section-lead">Search by last name during the demo, or create a new owner profile on the spot.</p>
    </div>
    <a class="btn btn-secondary" th:href="@{/owners/new}" th:text="#{addOwner}">Add Owner</a>
  </section>

  <section class="panel-card search-panel">
    <form th:object="${owner}" th:action="@{/owners}" method="get" class="app-search-form" id="search-owner-form">
      <label class="form-label search-label" th:for="lastName" th:text="#{lastName}">Last name</label>
      <div class="search-input-row">
        <input class="form-control form-control-lg" th:field="*{lastName}" size="30" maxlength="80"
          placeholder="Enter a family name" />
        <button type="submit" class="btn btn-primary" th:text="#{findOwner}">Find Owner</button>
      </div>
      <div class="form-error-list" th:if="${#fields.hasAnyErrors()}">
        <p th:each="err : ${#fields.allErrors()}" th:text="${err}">Error</p>
      </div>
    </form>

    <div class="quick-link-grid">
      <a class="quick-link-card" th:href="@{/}">
        <span class="fa fa-home quick-link-icon" aria-hidden="true"></span>
        <span class="quick-link-title" th:text="#{home}">Home</span>
        <span class="quick-link-copy">Return to the main demo overview.</span>
      </a>
      <a class="quick-link-card" th:href="@{/vets.html}">
        <span class="fa fa-user-md quick-link-icon" aria-hidden="true"></span>
        <span class="quick-link-title" th:text="#{vets}">Veterinarians</span>
        <span class="quick-link-copy">Switch to the clinic staffing view.</span>
      </a>
    </div>
  </section>

</body>

</html>
